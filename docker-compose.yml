# Infraestrutura local (recomendado quando Docker estiver disponível).
# Sem Docker, use o Postgres embutido de desenvolvimento: `npm run db:dev` no backend/.
services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  crm_pgdata:
